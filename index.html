<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OT Tracker">
<title>OT Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:sans-serif;padding:16px}
h1{color:#60a5fa;font-size:22px;margin-bottom:16px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:14px;margin-bottom:12px}
.total{font-size:28px;font-weight:700;color:#60a5fa}
.sub{font-size:12px;color:#64748b;margin-top:4px}
input,select{width:100%;background:#0a0e1a;border:1px solid #1e3a5f;color:#e2e8f0;padding:10px;border-radius:8px;font-size:14px;margin-bottom:10px}
button{width:100%;background:#2563eb;border:none;color:#fff;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.btn-del{background:#991b1b;width:auto;padding:4px 10px;font-size:12px;border-radius:6px}
table{width:100%;border-collapse:collapse;margin-top:8px}
td,th{padding:8px;font-size:13px;border-bottom:1px solid #1e293b;text-align:left}
th{color:#60a5fa;font-size:11px}
.night{color:#a78bfa}
.day{color:#fbbf24}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px}
.row{display:flex;gap:10px}
.row>div{flex:1}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
select option{background:#0f172a}
</style>
</head>
<body>
<h1>🕐 OT Tracker</h1>

<div class="card" id="total-card">
  <div class="sub">รายได้รวม</div>
  <div class="total" id="total-display">฿0</div>
  <div class="sub" id="sub-display"></div>
</div>

<div class="card">
  <label>วันที่</label>
  <input type="date" id="f-date">
  <div class="row">
    <div>
      <label>กะ</label>
      <select id="f-shift">
        <option value="day">🌤 กะเช้า</option>
        <option value="night">🌙 กะดึก (+฿265)</option>
      </select>
    </div>
    <div>
      <label>ชม.โอที</label>
      <input type="number" id="f-hours" min="0" step="0.5" placeholder="0">
    </div>
  </div>
  <label>ประเภทวัน</label>
  <select id="f-type">
    <option value="weekday">วันธรรมดา (฿121/ชม.)</option>
    <option value="holiday">วันหยุด (฿161/ชม. / >8ชม.฿242)</option>
  </select>
  <button onclick="addEntry()">✅ บันทึกโอที</button>
</div>

<div class="card">
  <table>
    <thead>
      <tr><th>วันที่</th><th>กะ</th><th>ชม.</th><th>ค่าโอที</th><th>ค่ากะ</th><th></th></tr>
    </thead>
    <tbody id="entry-list"></tbody>
  </table>
</div>

<script>
var MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

var INIT = [
  {id:1,date:"2026-04-18",shift:"day",hours:8,type:"holiday"},
  {id:2,date:"2026-04-19",shift:"night",hours:10,type:"holiday"},
  {id:3,date:"2026-04-20",shift:"night",hours:0,type:"weekday"},
  {id:4,date:"2026-04-21",shift:"night",hours:0,type:"weekday"},
  {id:5,date:"2026-04-22",shift:"night",hours:1.5,type:"weekday"},
  {id:6,date:"2026-04-23",shift:"night",hours:2,type:"weekday"},
  {id:7,date:"2026-04-24",shift:"night",hours:2,type:"weekday"},
  {id:8,date:"2026-04-25",shift:"night",hours:1.5,type:"weekday"},
  {id:9,date:"2026-04-27",shift:"day",hours:2.5,type:"weekday"},
  {id:10,date:"2026-04-28",shift:"day",hours:2,type:"weekday"},
  {id:11,date:"2026-04-29",shift:"day",hours:2.5,type:"weekday"},
  {id:12,date:"2026-04-30",shift:"day",hours:3,type:"weekday"},
  {id:13,date:"2026-05-04",shift:"night",hours:10.5,type:"holiday"},
  {id:14,date:"2026-05-05",shift:"night",hours:2,type:"weekday"},
  {id:15,date:"2026-05-06",shift:"night",hours:2,type:"weekday"}
];

function loadEntries() {
  try {
    var v = localStorage.getItem("ot2");
    return v ? JSON.parse(v) : INIT;
  } catch(e) { return INIT; }
}

function saveEntries(entries) {
  try { localStorage.setItem("ot2", JSON.stringify(entries)); } catch(e) {}
}

function calcOT(hours, shift, type) {
  if (type === "holiday") {
    return Math.min(hours, 8) * 161 + Math.max(hours - 8, 0) * 242;
  }
  return shift === "day" ? hours * 121 : hours * 161;
}

function fmtDate(s) {
  var d = new Date(s);
  return d.getDate() + " " + MONTHS[d.getMonth()];
}

function render() {
  var entries = loadEntries();
  var totalOT = 0, totalNight = 0;

  var html = "";
  entries.slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); }).forEach(function(e) {
    var ot = calcOT(e.hours, e.shift, e.type);
    var na = e.shift === "night" ? 265 : 0;
    totalOT += ot;
    totalNight += na;
    html += "<tr>" +
      "<td>" + fmtDate(e.date) + "</td>" +
      "<td class='" + e.shift + "'>" + (e.shift==="day"?"🌤 เช้า":"🌙 ดึก") + "</td>" +
      "<td>" + e.hours + "</td>" +
      "<td>" + (ot>0 ? "฿"+ot.toFixed(2) : "–") + "</td>" +
      "<td>" + (na>0 ? "฿"+na : "–") + "</td>" +
      "<td><button class='btn-del' onclick='delEntry("+e.id+")'>ลบ</button></td>" +
      "</tr>";
  });

  document.getElementById("entry-list").innerHTML = html;
  document.getElementById("total-display").textContent = "฿" + (totalOT + totalNight).toLocaleString("th-TH", {minimumFractionDigits:2});
  document.getElementById("sub-display").textContent = "โอที ฿" + totalOT.toFixed(2) + " + ค่ากะดึก ฿" + totalNight;
}

function addEntry() {
  var date = document.getElementById("f-date").value;
  var shift = document.getElementById("f-shift").value;
  var hours = parseFloat(document.getElementById("f-hours").value) || 0;
  var type = document.getElementById("f-type").value;

  if (!date) { alert("กรุณาเลือกวันที่"); return; }

  var entries = loadEntries();
  entries.push({id: Date.now(), date: date, shift: shift, hours: hours, type: type});
  saveEntries(entries);

  document.getElementById("f-date").value = "";
  document.getElementById("f-hours").value = "";
  render();
}

function delEntry(id) {
  if (!confirm("ลบรายการนี้?")) return;
  var entries = loadEntries().filter(function(e){ return e.id !== id; });
  saveEntries(entries);
  render();
}

render();
</script>

</body>
</html>
