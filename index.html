<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="OT Tracker"/>
<meta name="theme-color" content="#0a0e1a"/>
<title>OT Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Sarabun','Noto Sans Thai',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{display:none}
.header{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:1px solid #1e3a5f;padding:18px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.title-sub{font-size:10px;color:#60a5fa;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.title{font-size:22px;font-weight:700}
.title span{color:#60a5fa}
.btn-add{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;color:#fff;padding:9px 16px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.btn-add.cancel{background:#1e3a5f}
.btn-settings{background:#1e293b;border:1px solid #334155;color:#a78bfa;padding:9px 14px;border-radius:12px;font-size:13px}
.periods{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
.period-btn{flex-shrink:0;border:none;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#1e293b;color:#94a3b8}
.period-btn.active{background:#2563eb;color:#fff}
.tabs{display:flex;gap:2px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#94a3b8;padding:9px 14px;font-size:13px;font-weight:600;border-radius:8px 8px 0 0}
.tab.active{background:#1e3a5f;border-bottom:2px solid #60a5fa;color:#60a5fa}
.content{padding:18px 14px;max-width:680px;margin:0 auto}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:16px;margin-bottom:14px}
.card-blue{background:linear-gradient(135deg,#1e3a5f,#0f2044);border:1px solid rgba(30,64,175,0.27)}
.grand-total-label{font-size:11px;color:#94a3b8;margin-bottom:5px;letter-spacing:1px}
.grand-total{font-size:34px;font-weight:700;color:#60a5fa}
.grand-sub{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;font-size:12px}
.grand-count{font-size:12px;color:#475569;margin-top:4px}
.shift-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.shift-card{background:#0f172a;border-radius:14px;padding:14px}
.shift-label{font-size:12px;font-weight:600;margin-bottom:6px}
.shift-amount{font-size:20px;font-weight:700}
.shift-sub{font-size:11px;margin-top:2px;opacity:0.8}
.shift-hrs{font-size:11px;color:#64748b;margin-top:1px}
.bar-bg{height:4px;background:#1e293b;border-radius:2px;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s}
.period-summary-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:12px}
.period-row{padding:10px 0;border-bottom:1px solid #1e293b}
.period-row-top{display:flex;justify-content:space-between;align-items:center}
.period-name{font-size:14px;font-weight:600}
.period-meta{font-size:11px;color:#64748b;margin-top:2px}
.period-amount{font-size:17px;font-weight:700;color:#60a5fa}
.period-breakdown{display:flex;gap:10px;margin-top:5px;font-size:11px}
.day-card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:14px;margin-bottom:10px}
.day-card.holiday{border-color:rgba(52,211,153,0.2)}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-date{font-size:15px;font-weight:700}
.day-badge{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:3px}
.badge-holiday{background:#0d3b2e;color:#34d399}
.badge-weekday{background:#1e3a5f;color:#60a5fa}
.day-total-label{font-size:10px;color:#64748b}
.day-total{font-size:20px;font-weight:700;color:#60a5fa}
.day-hrs{font-size:11px;color:#64748b}
.shift-row{background:#0a0e1a;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.shift-tag{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.shift-info{font-size:12px;color:#64748b;margin-top:5px}
.shift-night-allow{font-size:11px;color:#a78bfa;margin-top:2px}
.shift-amount2{font-size:16px;font-weight:700;margin-bottom:6px}
.action-btns{display:flex;gap:5px}
.btn-edit{background:#1e3a5f;border:none;color:#60a5fa;padding:4px 10px;border-radius:7px;font-size:11px}
.btn-del{background:#3b1a1a;border:none;color:#f87171;padding:4px 10px;border-radius:7px;font-size:11px}
.subtotal-row{display:flex;gap:6px;margin-top:6px}
.subtotal-day{flex:1;background:rgba(45,32,0,0.33);border:1px solid rgba(251,191,36,0.13);border-radius:8px;padding:5px 10px;font-size:11px}
.subtotal-night{flex:1;background:rgba(30,16,64,0.33);border:1px solid rgba(167,139,250,0.13);border-radius:8px;padding:5px 10px;font-size:11px}
table{width:100%;border-collapse:collapse}
.tbl-head{background:#0a0e1a;border-bottom:2px solid #1e3a5f}
.tbl-head th{font-size:12px;font-weight:700;color:#60a5fa;padding:10px 14px}
.tbl-head th:not(:first-child):not(:nth-child(2)){text-align:right}
.tbl-row td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(30,41,59,0.13)}
.tbl-row td:not(:first-child):not(:nth-child(2)){text-align:right}
.tbl-row.even{background:#0f172a}
.tbl-row.odd{background:#0d1424}
.tbl-footer td{padding:12px 14px;font-size:13px;font-weight:700;background:rgba(30,58,95,0.2);border-top:2px solid #1e3a5f}
.tbl-footer td:not(:first-child){text-align:right}
.empty{text-align:center;color:#475569;padding:60px;font-size:14px}
.form-card{background:linear-gradient(135deg,#0f2044,#0f172a);border:1px solid #1e3a5f;border-radius:16px;padding:18px;margin-bottom:18px}
.form-title{font-size:14px;font-weight:700;margin-bottom:14px;color:#60a5fa}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px}
.form-inp{width:100%;background:#0a0e1a;border:1px solid #1e3a5f;color:#e2e8f0;padding:10px 12px;border-radius:10px;font-size:14px}
.btn-holiday{width:100%;border-radius:10px;font-size:13px;font-weight:600;padding:10px 12px;text-align:left;border:1px solid #1e3a5f;background:#0a0e1a;color:#64748b}
.btn-holiday.active{background:#0d3b2e;border-color:#34d399;color:#34d399}
.night-notice{background:rgba(30,16,64,0.53);border:1px solid rgba(167,139,250,0.27);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#a78bfa}
.preview-box{background:#0a0e1a;border:1px solid #1e293b;border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px}
.preview-row{display:flex;justify-content:space-between;color:#94a3b8;margin-bottom:3px}
.preview-night{display:flex;justify-content:space-between;color:#a78bfa;margin-bottom:3px}
.preview-total{display:flex;justify-content:space-between;font-weight:700;color:#60a5fa;margin-top:8px;padding-top:8px;border-top:1px solid #1e293b}
.preview-label{font-size:11px;color:#64748b;margin-bottom:6px}
.btn-submit{width:100%;margin-top:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700}
.settings-card{background:linear-gradient(135deg,#1a0f3a,#0f172a);border:1px solid rgba(167,139,250,0.27);border-radius:16px;padding:18px;margin-bottom:18px}
.settings-title{font-size:14px;font-weight:700;margin-bottom:4px;color:#a78bfa}
.settings-sub{font-size:12px;color:#64748b;margin-bottom:14px}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.settings-row{display:flex;gap:10px;margin-top:14px}
.btn-cancel-s{flex:1;background:#1e293b;border:none;color:#94a3b8;padding:11px;border-radius:10px;font-size:13px}
.btn-save-s{flex:2;background:linear-gradient(135deg,#6d28d9,#4c1d95);border:none;color:#fff;padding:11px;border-radius:10px;font-size:14px;font-weight:700}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.modal{background:#0f172a;border:1px solid rgba(248,113,113,0.27);border-radius:16px;padding:26px;max-width:300px;width:100%}
.modal-icon{font-size:20px;margin-bottom:8px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:6px}
.modal-msg{font-size:13px;color:#94a3b8;margin-bottom:22px}
.modal-btns{display:flex;gap:10px}
.btn-modal-cancel{flex:1;background:#1e293b;border:none;color:#e2e8f0;padding:11px;border-radius:10px;font-size:13px}
.btn-modal-del{flex:1;background:#991b1b;border:none;color:#fff;padding:11px;border-radius:10px;font-size:13px;font-weight:700}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
select option{background:#0f172a}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const DEF_RATES = {nightAllowance:265,dayRate:121,nightRate:161,holidayRate:161,holidayOTRate:242};
const INIT = [
  {id:1,date:"2026-04-18",shift:"day",hours:8,isHoliday:true},
  {id:2,date:"2026-04-19",shift:"night",hours:10,isHoliday:true},
  {id:3,date:"2026-04-20",shift:"night",hours:0,isHoliday:false},
  {id:4,date:"2026-04-21",shift:"night",hours:0,isHoliday:false},
  {id:5,date:"2026-04-22",shift:"night",hours:1.5,isHoliday:false},
  {id:6,date:"2026-04-23",shift:"night",hours:2,isHoliday:false},
  {id:7,date:"2026-04-24",shift:"night",hours:2,isHoliday:false},
  {id:8,date:"2026-04-25",shift:"night",hours:1.5,isHoliday:false},
  {id:9,date:"2026-04-27",shift:"day",hours:2.5,isHoliday:false},
  {id:10,date:"2026-04-28",shift:"day",hours:2,isHoliday:false},
  {id:11,date:"2026-04-29",shift:"day",hours:2.5,isHoliday:false},
  {id:12,date:"2026-04-30",shift:"day",hours:3,isHoliday:false},
  {id:13,date:"2026-05-04",shift:"night",hours:10.5,isHoliday:true},
  {id:14,date:"2026-05-05",shift:"night",hours:2,isHoliday:false},
  {id:15,date:"2026-05-06",shift:"night",hours:2,isHoliday:false},
];

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function calcOT(h,shift,holiday,rates){
if(holiday) return Math.min(h,8)*rates.holidayRate+Math.max(h-8,0)*rates.holidayOTRate;
return shift===“day”?h*rates.dayRate:h*rates.nightRate;
}
function calcTotal(e,rates){return calcOT(e.hours,e.shift,e.isHoliday,rates)+(e.shift===“night”?rates.nightAllowance:0);}
function getPK(date){
const d=new Date(date),day=d.getDate(),m=d.getMonth(),y=d.getFullYear();
if(day<=15)return `${y}-${String(m+1).padStart(2,"0")}`;
const n=new Date(y,m+1,1);return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
}
function getPL(date){
const d=new Date(date),day=d.getDate(),m=d.getMonth(),y=d.getFullYear();
if(day<=15)return `${MONTHS[m]} ${y+543}`;
const n=new Date(y,m+1,1);return `${MONTHS[n.getMonth()]} ${n.getFullYear()+543}`;
}
function fmt(s){const d=new Date(s);return `${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function fmtNum(n,dec=0){return n.toLocaleString(“th-TH”,{minimumFractionDigits:dec});}

// State
let state = {
entries: load(“ot_e”, INIT),
rates: load(“ot_r”, DEF_RATES),
tab: “dashboard”,
period: “all”,
showForm: false,
showSettings: false,
editId: null,
deleteId: null,
form: {date:””,shift:“day”,hours:””,isHoliday:false},
tempRates: {…DEF_RATES},
};

function setState(patch){
Object.assign(state, typeof patch===“function”?patch(state):patch);
render();
}

function saveEntries(entries){save(“ot_e”,entries);setState({entries});}
function saveRates(rates){save(“ot_r”,rates);setState({rates});}

function getPeriods(){
const keys=[…new Set(state.entries.map(e=>getPK(e.date)))].sort();
return keys.map(k=>({key:k,label:getPL(state.entries.find(e=>getPK(e.date)===k).date)}));
}

function getFiltered(){
return state.period===“all”?state.entries:state.entries.filter(e=>getPK(e.date)===state.period);
}

function submitForm(){
const f=state.form;
if(!f.date)return;
const entry={…f,hours:parseFloat(f.hours)||0};
let entries;
if(state.editId!==null){
entries=state.entries.map(e=>e.id===state.editId?{…entry,id:state.editId}:e);
} else {
entries=[…state.entries,{…entry,id:Date.now()}];
}
save(“ot_e”,entries);
setState({entries,showForm:false,editId:null,form:{date:””,shift:“day”,hours:””,isHoliday:false},tab:“list”});
}

function render(){
const {entries,rates,tab,period,showForm,showSettings,editId,deleteId,form,tempRates}=state;
const periods=getPeriods();
const filtered=getFiltered();

const totalHours=filtered.reduce((s,e)=>s+e.hours,0);
const totalOT=filtered.reduce((s,e)=>s+calcOT(e.hours,e.shift,e.isHoliday,rates),0);
const nightCount=filtered.filter(e=>e.shift===“night”).length;
const totalNight=nightCount*rates.nightAllowance;
const grand=totalOT+totalNight;
const dayHrs=filtered.filter(e=>e.shift===“day”).reduce((s,e)=>s+e.hours,0);
const nightHrs=filtered.filter(e=>e.shift===“night”).reduce((s,e)=>s+e.hours,0);
const dayPay=filtered.filter(e=>e.shift===“day”).reduce((s,e)=>s+calcTotal(e,rates),0);
const nightPay=filtered.filter(e=>e.shift===“night”).reduce((s,e)=>s+calcTotal(e,rates),0);

const previewOT=calcOT(parseFloat(form.hours)||0,form.shift,form.isHoliday,rates);
const previewNight=form.shift===“night”?rates.nightAllowance:0;
const previewTotal=previewOT+previewNight;

// byDate
const map={};
[…filtered].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e=>{
if(!map[e.date])map[e.date]=[];map[e.date].push(e);
});
const byDate=Object.entries(map);

let html=`

  <div class="header">
    <div class="header-top">
      <div>
        <div class="title-sub">ระบบบันทึก</div>
        <div class="title">โอที <span>Tracker</span></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-settings" onclick="setState({showSettings:!state.showSettings,showForm:false,tempRates:{...state.rates}})">⚙️</button>
        <button class="btn-add ${showForm?'cancel':''}" onclick="setState({showForm:!state.showForm,showSettings:false,editId:null,form:{date:'',shift:'day',hours:'',isHoliday:false},tab:'list'})">
          <span style="font-size:16px">${showForm?"✕":"+"}</span>${showForm?"ยกเลิก":"บันทึกโอที"}
        </button>
      </div>
    </div>
    <div class="periods">
      <button class="period-btn ${period==="all"?"active":""}" onclick="setState({period:'all'})">ทั้งหมด</button>
      ${periods.map(p=>`<button class="period-btn ${period===p.key?"active":""}" onclick="setState({period:'${p.key}'})">${p.label}</button>`).join("")}
    </div>
    <div class="tabs">
      <button class="tab ${tab==="dashboard"?"active":""}" onclick="setState({tab:'dashboard'})">📊 สรุป</button>
      <button class="tab ${tab==="list"?"active":""}" onclick="setState({tab:'list'})">📋 รายวัน</button>
      <button class="tab ${tab==="table"?"active":""}" onclick="setState({tab:'table'})">📄 ตาราง</button>
    </div>
  </div>
  <div class="content">`;

// Settings
if(showSettings){
html+=`<div class="settings-card"> <div class="settings-title">⚙️ ตั้งค่าอัตราโอที</div> <div class="settings-sub">ปรับได้เมื่อเงินเดือนขึ้น</div> <div class="settings-grid"> ${[ {k:"dayRate",l:"🌤 กะเช้า (บาท/ชม.)",c:"#fbbf24"}, {k:"nightRate",l:"🌙 กะดึก (บาท/ชม.)",c:"#a78bfa"}, {k:"holidayRate",l:"🏖 วันหยุด ≤8ชม.",c:"#34d399"}, {k:"holidayOTRate",l:"🏖 วันหยุด >8ชม.",c:"#f87171"}, ].map(({k,l,c})=>`<div><label style="font-size:11px;color:${c};display:block;margin-bottom:4px">${l}</label>
<input type="number" class="form-inp" style="text-align:right" value="${tempRates[k]}" onchange="state.tempRates.${k}=parseFloat(this.value)||0"/></div>`).join("")} <div style="grid-column:1/-1"><label style="font-size:11px;color:#a78bfa;display:block;margin-bottom:4px">🌙 ค่ากะดึก (บาท/กะ)</label> <input type="number" class="form-inp" style="text-align:right" value="${tempRates.nightAllowance}" onchange="state.tempRates.nightAllowance=parseFloat(this.value)||0"/></div> </div> <div class="settings-row"> <button class="btn-cancel-s" onclick="setState({showSettings:false})">ยกเลิก</button> <button class="btn-save-s" onclick="saveRates({...state.tempRates});setState({showSettings:false})">💾 บันทึกอัตราใหม่</button> </div> </div>`;
}

// Form
if(showForm){
html+=`<div class="form-card"> <div class="form-title">${editId?"✏️ แก้ไขรายการ":"➕ เพิ่มรายการโอที"}</div> ${form.shift==="night"?`<div class="night-notice">🌙 กะดึก — ได้ค่ากะเพิ่ม <b>฿${rates.nightAllowance}</b>/กะ (แม้โอที 0 ชม.)</div>`:""} <div class="form-grid"> <div class="form-group"><label>วันที่</label> <input type="date" class="form-inp" value="${form.date}" onchange="setState({form:{...state.form,date:this.value}})"/></div> <div class="form-group"><label>กะ</label> <select class="form-inp" onchange="setState({form:{...state.form,shift:this.value}})"> <option value="day" ${form.shift==="day"?"selected":""}>🌤 กะเช้า</option> <option value="night" ${form.shift==="night"?"selected":""}>🌙 กะดึก (+฿${rates.nightAllowance})</option> </select></div> <div class="form-group"><label>ชั่วโมงโอที</label> <input type="number" class="form-inp" min="0" step="0.5" value="${form.hours}" placeholder="0" onchange="setState({form:{...state.form,hours:this.value}})"/></div> <div class="form-group"><label>ประเภทวัน</label> <button class="btn-holiday ${form.isHoliday?"active":""}" onclick="setState({form:{...state.form,isHoliday:!state.form.isHoliday}})">${form.isHoliday?"🏖 วันหยุด ✓":"📅 วันธรรมดา"}</button></div> </div> ${form.date?`<div class="preview-box">
<div class="preview-label">ยอดที่จะได้รับ</div>
<div class="preview-row"><span>ค่าโอที</span><span>฿${fmtNum(previewOT,2)}</span></div>
${form.shift===“night”?`<div class="preview-night"><span>🌙 ค่ากะดึก</span><span>฿${rates.nightAllowance}</span></div>`:””}
<div class="preview-total"><span>รวม</span><span>฿${fmtNum(previewTotal,2)}</span></div>
</div>`:""} <button class="btn-submit" onclick="submitForm()">${editId?"💾 บันทึกการแก้ไข":"✅ เพิ่มรายการ"}</button> </div>`;
}

// Dashboard
if(tab===“dashboard”){

}

// List
if(tab===“list”){
if(byDate.length===0){html+=`<div class="empty">ยังไม่มีรายการ<br/>กด "+ บันทึกโอที" เพื่อเพิ่ม</div>`;}
byDate.forEach(([date,dayEnts])=>{
const dOT=dayEnts.reduce((s,e)=>s+calcOT(e.hours,e.shift,e.isHoliday,rates),0);
const dN=dayEnts.filter(e=>e.shift===“night”).length*rates.nightAllowance;
const dT=dOT+dN;
const dH=dayEnts.reduce((s,e)=>s+e.hours,0);
const isHol=dayEnts.some(e=>e.isHoliday);
const ds=dayEnts.filter(e=>e.shift===“day”);
const ns=dayEnts.filter(e=>e.shift===“night”);
html+=`<div class="day-card ${isHol?"holiday":""}"> <div class="day-header"> <div><div class="day-date">${fmt(date)}</div> <span class="day-badge ${isHol?"badge-holiday":"badge-weekday"}">${isHol?"🏖 วันหยุด":"📅 วันธรรมดา"}</span></div> <div style="text-align:right"> <div class="day-total-label">ยอดรวมวันนี้</div> <div class="day-total">฿${fmtNum(dT)}</div> ${dH>0?`<div class="day-hrs">${dH} ชม.</div>`:""} </div> </div>`;
[…dayEnts].sort((a,b)=>a.shift===“day”?-1:1).forEach(e=>{
const op=calcOT(e.hours,e.shift,e.isHoliday,rates);
const na=e.shift===“night”?rates.nightAllowance:0;
const tot=op+na;
const isDay=e.shift===“day”;
html+=`<div class="shift-row"> <div style="flex:1"> <span class="shift-tag" style="background:${isDay?"rgba(45,32,0,0.33)":"rgba(30,16,64,0.33)"};color:${isDay?"#fbbf24":"#a78bfa"}">${isDay?"🌤 กะเช้า":"🌙 กะดึก"}</span> <div class="shift-info">${e.hours>0?`⏱ ${e.hours} ชม.`:"⏱ ไม่มีโอที"}</div> ${e.shift==="night"?`<div class="shift-night-allow">🌙 ค่ากะ +฿${rates.nightAllowance}</div>`:""} </div> <div style="text-align:right;margin-left:10px"> <div class="shift-amount2">฿${fmtNum(tot)}</div> <div class="action-btns"> <button class="btn-edit" onclick="setState({form:{date:'${e.date}',shift:'${e.shift}',hours:${e.hours},isHoliday:${e.isHoliday}},editId:${e.id},showForm:true,tab:'list'})">แก้ไข</button> <button class="btn-del" onclick="setState({deleteId:${e.id}})">ลบ</button> </div> </div> </div>`;
});
if(dayEnts.length>1){
html+=`<div class="subtotal-row"> ${ds.length>0?`<div class="subtotal-day"><span style="color:#fbbf24">🌤 เช้า</span><span style="color:#94a3b8;margin-left:5px">฿${fmtNum(ds.reduce((s,e)=>s+calcTotal(e,rates),0))}</span></div>`:""} ${ns.length>0?`<div class="subtotal-night"><span style="color:#a78bfa">🌙 ดึก</span><span style="color:#94a3b8;margin-left:5px">฿${fmtNum(ns.reduce((s,e)=>s+calcTotal(e,rates),0))}</span></div>`:""} </div>`;
}
html+=`</div>`;
});
}

// Table
if(tab===“table”){
const sorted=[…filtered].sort((a,b)=>new Date(a.date)-new Date(b.date));
html+=`<div class="card" style="padding:0;overflow:hidden"><table> <thead class="tbl-head"><tr> <th style="text-align:left">วันที่</th><th style="text-align:left">กะ</th> <th style="text-align:right">ชม.</th><th style="text-align:right">ค่าโอที</th><th style="text-align:right">ค่ากะ</th> </tr></thead><tbody>`;
sorted.forEach((e,i)=>{
const op=calcOT(e.hours,e.shift,e.isHoliday,rates);
const na=e.shift===“night”?rates.nightAllowance:0;
const d=new Date(e.date);
const sl=e.shift===“day”?(e.isHoliday?“เช้า (วันหยุด)”:“เช้า”):(e.isHoliday?“ดึก (วันหยุด)”:“ดึก”);
html+=`<tr class="tbl-row ${i%2===0?"even":"odd"}"> <td style="font-weight:600">${d.getDate()} ${MONTHS[d.getMonth()]}</td> <td style="color:${e.shift==="night"?"#a78bfa":"#fbbf24"}">${sl}</td> <td style="text-align:right;font-weight:600">${e.hours}</td> <td style="text-align:right;color:${op>0?"#e2e8f0":"#475569"}">${op>0?fmtNum(op,2):"–"}</td> <td style="text-align:right;color:${na>0?"#a78bfa":"#475569"}">${na>0?na:"–"}</td> </tr>`;
});
html+=`</tbody><tfoot><tr class="tbl-footer"> <td colspan="2" style="color:#60a5fa">รวมทั้งหมด</td> <td style="color:#60a5fa;text-align:right">${totalHours}</td> <td style="color:#60a5fa;text-align:right">${fmtNum(totalOT,2)}</td> <td style="color:#a78bfa;text-align:right">${fmtNum(totalNight)}</td> </tr></tfoot></table></div>`;
}

html+=`</div>`;

// Delete modal
if(deleteId){
html+=`<div class="modal-bg"> <div class="modal"> <div class="modal-icon">🗑️</div> <div class="modal-title">ยืนยันการลบ</div> <div class="modal-msg">ต้องการลบรายการนี้ไหม?</div> <div class="modal-btns"> <button class="btn-modal-cancel" onclick="setState({deleteId:null})">ยกเลิก</button> <button class="btn-modal-del" onclick="saveEntries(state.entries.filter(e=>e.id!==state.deleteId));setState({deleteId:null})">ลบ</button> </div> </div> </div>`;
}

document.getElementById(“app”).innerHTML=html;
}

render();
